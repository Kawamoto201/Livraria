{% extends "base.html" %}

{% block conteudo %}
	<main>
		<h1>CADASTRO DE LIVRO</h1>
		<P>Livro</P>
		<form method="POST">
			<div>
				<label for="tx-titulo-livro">Titulo do Livro:</label>
				<input type="text" name="titulo-Livro" id="tx-titulo-livro" required>
			</div>
			<div>
				<label for="tx-autor-livro">Autor:</label>
				<input type="text" name="autor-livro" id="tx-autor-livro" required>
			</div>
			<div>
				<label for="nm-valor-livro">Preço:</label>
				<input type="number" name="valor-livro" id="nm-valor-livro" step="0.01" min="0" inputmode="decimal" required>
			</div>
			<div>
				<label for="nm-qtd-livro">Quantidade:</label>
				<input type="number" name="qtd-livro" id="nm-qtd-livro" required>
			</div>
			<br>
			<div>
				<button type="submit" id="cadastrar">Cadastrar Livro</button>
			</div>
		</form>
	</main>
{% endblock %}
